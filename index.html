<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human Model</title>
    <!-- Zmieniamy na elegancki, czysty font (np. Inter) zamiast terminalowego hakerstwa -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <header class="top-bar">
        <h1>Human Model</h1>
        <!-- Powrót do zakładek, co fizycznie rozdziela modele na osobne widoki grafowe -->
        <div class="nav-controls">
          <button class="tab-btn active" data-tab="mikro">MIKRO</button>
          <button class="tab-btn" data-tab="makro">MAKRO</button>
        </div>
      </header>

      <main class="network-wrapper">
        <div id="network-canvas"></div>
      </main>

      <aside id="side-panel" class="hidden">
        <button id="close-panel" class="icon-btn">
          <i data-lucide="x"></i>
        </button>
        <div class="panel-header">
          <h2 id="node-title"></h2>
          <p id="node-desc" class="desc-text"></p>
        </div>
        
        <div class="panel-content">
          <section class="data-block">
            <h3><i data-lucide="brain"></i> Psychologia</h3>
            <p id="node-psych"></p>
          </section>
          
          <section class="data-block">
            <h3><i data-lucide="library"></i> Filozofia</h3>
            <p id="node-phil"></p>
          </section>
          
          <section class="data-block">
            <h3><i data-lucide="microscope"></i> Nauka</h3>
            <p id="node-sci"></p>
          </section>
          
          <section class="data-block lifehack-block">
            <h3><i data-lucide="zap"></i> Wskazówka Operacyjna</h3>
            <p id="node-lifehack"></p>
          </section>
        </div>
      </aside>

      <!-- Przywrócenie nazwy Dzienniczek i usunięcie hakerskich ikon terminala -->
      <div id="system-log" class="collapsed">
        <div class="log-header" id="log-toggle">
          <h3><i data-lucide="book-open"></i> Dzienniczek</h3>
          <i data-lucide="chevron-up" id="log-chevron"></i>
        </div>
        <div class="log-content">
          <textarea id="log-input" placeholder="Zapisz swoje przemyślenia..."></textarea>
          <button id="save-log">Dodaj wpis</button>
          <div id="saved-logs-container"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
